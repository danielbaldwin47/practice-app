# Ingress shape for ADR 0004, kept here so it can be validated without a live
# tunnel: `cloudflared tunnel ingress validate --config cloudflared/config.yml`.
#
# Two hostnames on the owned domain. Note what is NOT here: Postgres and the MinIO
# console are absent, so the tunnel exposes only the two services a client needs.
tunnel: practice-app
credentials-file: /etc/cloudflared/practice-app.json

ingress:
  # PowerSync's sync endpoint. Long-lived streaming connection -- no timeout.
  - hostname: sync.example.com
    service: http://powersync:8080

  # The write path, token endpoint and JWKS.
  - hostname: api.example.com
    service: http://api:6060

  # MinIO's S3 port. Not optional: presigned URLs are opened by the device and the
  # host is covered by the signature, so the bytes cannot be reached through either
  # hostname above. The CONSOLE port (9001) is deliberately still absent.
  - hostname: audio.example.com
    service: http://minio:9000

  - service: http_status:404
